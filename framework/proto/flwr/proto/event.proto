syntax = "proto3";

package flwr.proto;

import "flwr/proto/node.proto";

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  
  // Round lifecycle events
  EVENT_TYPE_ROUND_STARTED = 1;
  EVENT_TYPE_ROUND_CONFIGURE_SENT = 2;
  EVENT_TYPE_ROUND_FIT_RECEIVED = 3;
  EVENT_TYPE_ROUND_FIT_AGGREGATED = 4;
  EVENT_TYPE_ROUND_EVALUATE_RECEIVED = 5;
  EVENT_TYPE_ROUND_EVALUATE_AGGREGATED = 6;
  EVENT_TYPE_ROUND_COMPLETED = 7;
  EVENT_TYPE_ROUND_FAILED = 8;
  
  // Run lifecycle events
  EVENT_TYPE_RUN_STARTED = 9;
  EVENT_TYPE_RUN_COMPLETED = 10;
  EVENT_TYPE_RUN_FAILED = 11;
  
  // Node fit events
  EVENT_TYPE_NODE_FIT_STARTED = 12;
  EVENT_TYPE_NODE_FIT_COMPLETED = 13;
  EVENT_TYPE_NODE_FIT_FAILED = 14;
  
  // Node evaluate events
  EVENT_TYPE_NODE_EVALUATE_STARTED = 15;
  EVENT_TYPE_NODE_EVALUATE_COMPLETED = 16;
  EVENT_TYPE_NODE_EVALUATE_FAILED = 17;
}

message Event {
  double timestamp = 1;
  uint64 run_id = 2;
  uint64 node_id = 3;
  EventType event_type = 4;
  map<string, string> metadata = 5;
}

message PushEventsRequest {
  Node node = 1;
  uint64 run_id = 2;
  repeated Event events = 3;
}

message PushEventsResponse {}
